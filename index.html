<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Cáncer de Mama | Cali 2026</title>
    <!-- Dependencias externas -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* vidrio ligero para tarjetas */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        body {
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="p-4 md:p-8 font-sans">

    <nav class="max-w-6xl mx-auto mb-8 flex justify-between items-center">
        <h1 class="text-3xl font-bold text-pink-700">Dashboard de Cáncer de Mama</h1>
        <a href="/" class="text-sm text-gray-600 hover:text-gray-800">Recargar</a>
    </nav>

    <main class="max-w-6xl mx-auto space-y-8">
        <!-- panel de estado / resumen corto -->
        <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-card p-6 rounded-2xl shadow-xl">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">Resumen de la Aplicación</h2>
                    <ul class="space-y-2 text-sm text-gray-700">
                        <li><strong>API:</strong> <span id="api-status" class="px-2 py-1 rounded-full bg-yellow-100 text-yellow-700">verificando...</span></li>
                        <li><strong>Dataset:</strong> PIII 2023 (mama)
                        <li><strong>Última carga:</strong> <span id="last-update">-</span></li>
                    </ul>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="glass-card p-6 rounded-2xl shadow-xl">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-semibold text-gray-800">Casos por Comuna</h2>
                        <button id="refresh-btn" class="text-pink-600 hover:text-pink-800 text-sm font-medium">Actualizar datos</button>
                    </div>
                    <div class="relative h-[400px]">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <footer class="text-center text-gray-400 text-sm">
            Fase&nbsp;1: Entorno reproducible, Pydantic y FastAPI — propuesto por curso.
        </footer>
    </main>

    <script>
        let myChart;
        const API_URL = 'http://127.0.0.1:8000/api/v1/stats';

        async function checkApi() {
            const statusEl = document.getElementById('api-status');
            try {
                // usamos GET porque FastAPI no responde a HEAD por defecto
                const res = await fetch(API_URL);
                if (res.ok) {
                    statusEl.innerText = 'conectada';
                    statusEl.className = 'px-2 py-1 rounded-full bg-green-100 text-green-700';
                } else {
                    statusEl.innerText = 'error';
                    statusEl.className = 'px-2 py-1 rounded-full bg-yellow-100 text-yellow-700';
                }
            } catch {
                statusEl.innerText = 'no disponible';
                statusEl.className = 'px-2 py-1 rounded-full bg-red-100 text-red-700';
            }
        }

        async function fetchData() {
            const statusLabel = document.getElementById('loading-status');
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                if (data.error) throw new Error(data.error);

                statusLabel && (statusLabel.innerText = "✅ Datos actualizados");
                renderChart(data);
                document.getElementById('last-update').innerText = new Date().toLocaleString();
            } catch (error) {
                console.error("Error fetching stats:", error);
                if (statusLabel) {
                    statusLabel.innerText = "❌ No se pudo obtener información";
                }
            }
        }

        function renderChart(data) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => `Comuna ${d.comuna}`),
                    datasets: [{
                        label: 'Casos',
                        data: data.map(d => d.cantidad),
                        backgroundColor: 'rgba(219, 39, 119, 0.7)',
                        borderColor: 'rgba(219, 39, 119, 1)',
                        borderWidth: 1,
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        document.getElementById('refresh-btn').addEventListener('click', () => {
            fetchData();
        });

        // inicialización
        checkApi();
        fetchData();
    </script>
</body>
</html>
